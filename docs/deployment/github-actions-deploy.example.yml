# 可选：推送 main 后自动部署到服务器
# 使用前：
# 1. 复制到 .github/workflows/deploy.yml
# 2. 在仓库 Settings → Secrets 中配置：DEPLOY_HOST, DEPLOY_USER, DEPLOY_KEY（或 SSH 私钥）
# 3. 服务器上已克隆项目并完成首次部署（.env、Docker 或 PM2 已就绪）

name: Deploy to server

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            cd /opt/awcc
            git pull
            docker compose up -d --build
            # 若使用 PM2：USE_PM2=1 ./scripts/deploy-update.sh
