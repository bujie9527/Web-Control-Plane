# Nginx 站点配置：ai.667788.cool → 反代到本机 3001
# 部署到服务器：sudo cp deploy/nginx-awcc.conf /etc/nginx/sites-available/awcc
# 启用：sudo ln -sf /etc/nginx/sites-available/awcc /etc/nginx/sites-enabled/
# 申请证书：sudo certbot --nginx -d ai.667788.cool

server {
    listen 80;
    server_name ai.667788.cool;
    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }
}
